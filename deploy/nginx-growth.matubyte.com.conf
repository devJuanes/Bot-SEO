# Nginx reverse proxy para Growth Factory
# Dominio: growth.matubyte.com
#
# Instalación en Ubuntu/Debian:
#   sudo cp deploy/nginx-growth.matubyte.com.conf /etc/nginx/sites-available/growth.matubyte.com
#   sudo ln -sf /etc/nginx/sites-available/growth.matubyte.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d growth.matubyte.com

upstream growth_factory {
    server 127.0.0.1:4100;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name growth.matubyte.com;

    # Certbot redirect (descomentar tras obtener SSL)
    # return 301 https://$host$request_uri;

    client_max_body_size 100M;

    location / {
        proxy_pass http://growth_factory;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

